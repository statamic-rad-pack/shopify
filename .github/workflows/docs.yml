name: Generate Docs
on:
  release:
    types: [released]
  workflow_dispatch:
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      working-directory: docs
    steps:
     # Check out master branch
      - name: Checkout
        uses: actions/checkout@master

      # Downloads, configures and caches Node.js
      # Docus (Nuxt 4) requires Node 22+ — one of its transitive deps
      # (@intlify/shared) fails to install below that.
      - name: Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # Install all dependencies needed to build our documentation
      - name: Install dependencies
        working-directory: ${{env.working-directory}}
        run: yarn

      # Pull vercel project info
      - name: Vercel pull
        working-directory: ${{env.working-directory}}
        run: yarn vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Build for vercel output (buildCommand/outputDirectory come from docs/vercel.json,
      # so this runs the static `nuxi generate` instead of Vercel's auto-detected
      # SSR `nuxi build`)
      - name: Vercel build
        working-directory: ${{env.working-directory}}
        run: yarn vercel build --token=${{ secrets.VERCEL_TOKEN }} --prod

      # Deploy to vercel
      - name: Vercel deploy
        working-directory: ${{env.working-directory}}
        id: deploy
        run: yarn vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --prod
